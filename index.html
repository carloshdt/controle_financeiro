<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <!-- Ícone do separador do navegador (Favicon) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <!-- Tailwind CSS para design responsivo e moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* Cores de status para o Farol de Orçamento */
        .bg-green-farol { background-color: #4CAF50; }
        .bg-yellow-farol { background-color: #FFC107; }
        .bg-red-farol { background-color: #F44336; }
        /* Lógica de exibição das abas */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* Overlay para o modal de edição */
        .modal-overlay { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); }

        /* Top-level navigation */
        .top-nav-active {
            border-bottom: 4px solid #4F46E5;
            color: #4F46E5;
            background: white;
        }
        .top-section { display: none; }
        .top-section.active { display: block; }

        /* Routine Board */
        .routine-board {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 16px;
            scrollbar-width: thin;
            scrollbar-color: rgba(99,102,241,0.3) transparent;
        }
        .routine-board::-webkit-scrollbar { height: 8px; }
        .routine-board::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 10px; }
        .routine-board::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 10px; }

        .routine-column {
            min-width: 220px;
            flex: 1;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .routine-column:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        .routine-column-drag-over {
            background: rgba(99,102,241,0.08) !important;
            border-color: rgba(99,102,241,0.5) !important;
            border-style: dashed !important;
        }

        .routine-card {
            background: white;
            border: 2px solid rgba(99,102,241,0.12);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            user-select: none;
        }
        .routine-drag-handle {
            position: absolute;
            top: 50%;
            right: 6px;
            transform: translateY(-50%);
            cursor: grab;
            color: #C7C7CC;
            font-size: 12px;
            line-height: 1;
            padding: 4px 2px;
            letter-spacing: 1px;
        }
        .routine-drag-handle:active { cursor: grabbing; }
        .routine-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            border-radius: 10px 0 0 10px;
            transform: scaleY(0);
            transition: transform 0.2s ease;
        }
        .routine-card:hover::before { transform: scaleY(1); }
        .routine-card:hover {
            box-shadow: 0 4px 12px rgba(99,102,241,0.15);
            transform: translateY(-2px);
            border-color: rgba(99,102,241,0.25);
        }
        .routine-card-dragging { opacity: 0.4; transform: rotate(3deg); }

        .routine-card-done {
            background: linear-gradient(135deg, #C7D2FE, #A5B4FC);
            border-color: #4F46E5;
            box-shadow: 0 4px 16px rgba(79,70,229,0.2);
        }
        .routine-card-done::before { transform: scaleY(1); }

        .routine-checkmark {
            position: absolute;
            top: 8px; right: 8px;
            width: 20px; height: 20px;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(79,70,229,0.4);
            animation: rCheckPop 0.3s ease;
        }
        @keyframes rCheckPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .routine-count {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(99,102,241,0.06);
            border: 1px solid rgba(99,102,241,0.1);
            font-size: 0.75rem;
            color: #6366F1;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .routine-count:hover {
            background: rgba(99,102,241,0.12);
            transform: scale(1.05);
        }
        .routine-goal-input {
            width: 80px;
            padding: 4px 8px;
            border: 2px solid #4F46E5;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            outline: none;
        }
        .routine-goal-input:focus {
            box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
        }

        .routine-delete-btn {
            position: absolute;
            top: 6px; right: 6px;
            width: 22px; height: 22px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #EF4444;
            transition: all 0.2s ease;
            line-height: 1;
            padding: 0;
        }
        .routine-delete-btn:hover {
            background: rgba(239,68,68,0.2);
            transform: scale(1.15);
        }

        @media (max-width: 768px) {
            .routine-board { flex-direction: column; }
            .routine-column { min-width: 100%; }
        }

        /* Investment Table */
        .inv-editable {
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.15s ease;
        }
        .inv-editable:hover {
            background: rgba(99,102,241,0.08);
        }
        .inv-input {
            width: 110px;
            padding: 4px 8px;
            border: 2px solid #4F46E5;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            outline: none;
            text-align: right;
        }
        .inv-input:focus {
            box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
        }
        .inv-positive { color: #16A34A; font-weight: 700; }
        .inv-negative { color: #DC2626; font-weight: 700; }
        .inv-zero { color: #9CA3AF; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

                <div class="flex gap-4 mb-6">

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, serverTimestamp, query, where, getDocs, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAd1b6_av2NKg5WDdM03W8m6KuGkxhQpyQ",
            authDomain: "controle-financeiro-926ca.firebaseapp.com",
            projectId: "controle-financeiro-926ca",
            storageBucket: "controle-financeiro-926ca.firebasestorage.app",
            messagingSenderId: "36138830702",
            appId: "1:36138830702:web:1455e530174bb08c038f7f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const appId = firebaseConfig.projectId;

        let entradas = [], saidas = [];
        let routineTasks = [], routineWeekStatus = [];
        let routineCountsMap = {}, routineGoalsMap = {};
        let rotinaUnsubscribers = [];
        let investimentos = [];
        let invTrackedYears = [];
        let invUnsubscribers = [];
        let currentUserId = null;

        function userPath(sub) { return `artifacts/${appId}/public/data/${currentUserId}_${sub}`; }

        const DAYS_ORDER = ['segunda','terca','quarta','quinta','sexta','sabado','domingo'];

        const orcamentos = {
            "Aluguel e condomínio": 5200, "Luz": 800, "Internet": 120, "Carro": 1500, "Cachorros": 600,
            "Limpeza-Casa": 400, "Lazer": 1000, "Outros": 500, "Pessoal Caique": 1200, "Pessoal Estefanie": 1200,
            "Pitoco": 5000, "Saúde": 200, "Casa": 500, "Alimentação": 500, "Presente": 200
        };

        const formatMoeda = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        const formatData = (d) => {
            if(!d) return "-";
            const [y, m, day] = d.split('-').map(Number);
            return `${String(day).padStart(2, '0')}/${String(m).padStart(2, '0')}/${String(y).slice(-2)}`;
        };

        // Tabs
        const tabs = [
            { btn: 'tabSaidas', content: 'contentSaidas' },
            { btn: 'tabEntradas', content: 'contentEntradas' },
            { btn: 'tabOrcamento', content: 'contentOrcamento' }
        ];
        tabs.forEach(t => {
            document.getElementById(t.btn).onclick = () => {
                tabs.forEach(x => {
                    document.getElementById(x.btn).className = 'flex-1 py-4 font-bold text-gray-500 hover:bg-gray-50 transition';
                    document.getElementById(x.content).classList.remove('active');
                });
                document.getElementById(t.btn).className = 'flex-1 py-4 font-bold text-indigo-600 border-b-4 border-indigo-600 bg-white';
                document.getElementById(t.content).classList.add('active');
            };
        });

        // Dropdowns
        function initSelects() {
            const cats = Object.keys(orcamentos);
            const catSel = document.getElementById('categoria');
            const editCatSel = document.getElementById('editCategoria');
            const filEnt = document.getElementById('filterEntrada');
            const filSai = document.getElementById('filterSaida');
            
            const options = cats.map(c => `<option value="${c}">${c}</option>`).join('');
            catSel.innerHTML = options;
            editCatSel.innerHTML = options;
            
            const filterOptions = '<option value="all">Todas as Categorias</option>' + options;
            filEnt.innerHTML = filterOptions;
            filSai.innerHTML = filterOptions;
        }

        // Render UI
        async function render() {
            const mes = parseInt(document.getElementById('mes').value);
            const ano = parseInt(document.getElementById('ano').value);
            const fEnt = document.getElementById('filterEntrada').value;
            const fSai = document.getElementById('filterSaida').value;

            const filterFn = (list, cat) => list.filter(t => {
                const [y, m] = t.data.split('-').map(Number);
                return y === ano && m === mes && (cat === 'all' || t.categoria === cat);
            }).sort((a, b) => new Date(b.data) - new Date(a.data));

            const entFil = filterFn(entradas, fEnt);
            const saiFil = filterFn(saidas, fSai);

            document.getElementById('totalEntradas').textContent = formatMoeda(entFil.reduce((s, t) => s + t.valor, 0));
            document.getElementById('totalSaidas').textContent = formatMoeda(saiFil.reduce((s, t) => s + t.valor, 0));
            document.getElementById('saldoMes').textContent = formatMoeda(entFil.reduce((s, t) => s + t.valor, 0) - saiFil.reduce((s, t) => s + t.valor, 0));

            document.getElementById('entradasList').innerHTML = entFil.map(t => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-4 py-3">${formatData(t.data)}</td>
                    <td class="px-4 py-3 text-green-600 font-bold">${formatMoeda(t.valor)}</td>
                    <td class="px-4 py-3">${t.descricao}</td>
                    <td class="px-4 py-3">${t.categoria}</td>
                    <td class="px-4 py-3">${t.local || '-'}</td>
                    <td class="px-4 py-3 flex gap-2">
                        <button onclick="window.abrirEditar('${t.id}', 'entrada')" class="bg-blue-100 text-blue-600 px-2 py-1 rounded font-bold hover:bg-blue-200 transition">Editar</button>
                        <button onclick="window.remover('${t.id}', 'entrada')" class="bg-red-100 text-red-600 px-2 py-1 rounded font-bold hover:bg-red-200">X</button>
                    </td>
                </tr>
            `).join('');

            document.getElementById('saidasList').innerHTML = saiFil.map(t => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-4 py-3">${formatData(t.data)}</td>
                    <td class="px-4 py-3 text-red-600 font-bold">${formatMoeda(t.valor)}</td>
                    <td class="px-4 py-3 font-medium">${t.descricao}</td>
                    <td class="px-4 py-3 text-gray-500">${t.categoria}</td>
                    <td class="px-4 py-3 text-gray-500">${t.local || '-'}</td>
                    <td class="px-4 py-3">${t.parcela ? `<span class='bg-orange-100 text-orange-700 px-2 rounded font-bold text-xs'>${t.parcela}</span>` : (t.recorrente ? '<span class="bg-indigo-100 text-indigo-700 px-2 rounded font-bold text-[10px] uppercase">FIXO</span>' : '-')}</td>
                    <td class="px-4 py-3 flex gap-2">
                        <button onclick="window.abrirEditar('${t.id}', 'saida')" class="bg-blue-100 text-blue-600 px-2 py-1 rounded font-bold hover:bg-blue-200 transition">Editar</button>
                        <button onclick="window.remover('${t.id}', 'saida')" class="bg-red-100 text-red-600 px-2 py-1 rounded font-bold hover:bg-red-200">X</button>
                    </td>
                </tr>
            `).join('');

            const gastosCat = saidas.filter(t => {
                const [y, m] = t.data.split('-').map(Number);
                return y === ano && m === mes;
            }).reduce((acc, t) => { acc[t.categoria] = (acc[t.categoria] || 0) + t.valor; return acc; }, {});

            document.getElementById('orcamentoList').innerHTML = Object.entries(orcamentos).map(([cat, limite]) => {
                const gasto = gastosCat[cat] || 0;
                const perc = Math.min((gasto / limite) * 100, 100);
                const cor = perc >= 100 ? 'bg-red-farol' : (perc >= 80 ? 'bg-yellow-farol' : 'bg-green-farol');
                return `
                    <div class="bg-white p-4 rounded-xl shadow border border-gray-100">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-gray-700">${cat}</span>
                            <div class="w-3 h-3 rounded-full ${cor} shadow-sm"></div>
                        </div>
                        <p class="text-xs text-gray-500">Limite: ${formatMoeda(limite)} | Gasto: ${formatMoeda(gasto)}</p>
                        <div class="w-full bg-gray-200 h-2 rounded-full mt-2"><div class="h-full rounded-full ${cor} transition-all duration-500" style="width:${perc}%"></div></div>
                    </div>
                `;
            }).join('');
        }

        // Global functions for HTML access
        window.remover = async (id, tipo) => {
            if(confirm('Apagar este registro permanentemente?')) {
                await deleteDoc(doc(db, `artifacts/${appId}/public/data/${tipo}`, id));
            }
        };

        window.abrirEditar = (id, tipo) => {
            const list = tipo === 'entrada' ? entradas : saidas;
            const item = list.find(t => t.id === id);
            if(!item) return;

            document.getElementById('editId').value = id;
            document.getElementById('editTipo').value = tipo;
            document.getElementById('editData').value = item.data;
            document.getElementById('editDescricao').value = item.descricao;
            document.getElementById('editCategoria').value = item.categoria;
            document.getElementById('editValor').value = item.valor;
            document.getElementById('editLocal').value = item.local || '';
            
            const extraFields = document.getElementById('editExtraFields');
            if(tipo === 'saida') {
                extraFields.classList.remove('hidden');
                document.getElementById('editParcela').value = item.parcela || '';
                document.getElementById('editRecorrente').checked = item.recorrente || false;
            } else {
                extraFields.classList.add('hidden');
            }

            const modal = document.getElementById('editModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        window.fecharModal = () => {
            const modal = document.getElementById('editModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        document.getElementById('editForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const tipo = document.getElementById('editTipo').value;
            
            const updatedData = {
                data: document.getElementById('editData').value,
                descricao: document.getElementById('editDescricao').value,
                categoria: document.getElementById('editCategoria').value,
                valor: parseFloat(document.getElementById('editValor').value),
                local: document.getElementById('editLocal').value
            };

            if(tipo === 'saida') {
                updatedData.parcela = document.getElementById('editParcela').value;
                updatedData.recorrente = document.getElementById('editRecorrente').checked;
            }

            try {
                await updateDoc(doc(db, `artifacts/${appId}/public/data/${tipo}`, id), updatedData);
                window.fecharModal();
            } catch (e) { console.error("Erro ao atualizar:", e); }
        };

        document.getElementById('transacaoForm').onsubmit = async (e) => {
            e.preventDefault();
            const tipo = document.getElementById('tipoTransacao').value;
            const baseData = {
                data: document.getElementById('data').value,
                descricao: document.getElementById('descricao').value,
                categoria: document.getElementById('categoria').value,
                valor: parseFloat(document.getElementById('valor').value),
                local: document.getElementById('local').value,
                timestamp: serverTimestamp()
            };

            const parc = document.getElementById('parcela').value;
            const rec = document.getElementById('recorrente').checked;

            if (tipo === 'saida') {
                const match = parc.match(/^(\d+)\/(\d+)$/);
                if (match) {
                    const atual = parseInt(match[1]), total = parseInt(match[2]);
                    for (let i = atual; i <= total; i++) {
                        const d = new Date(baseData.data + 'T00:00:00');
                        d.setMonth(d.getMonth() + (i - atual));
                        await addDoc(collection(db, `artifacts/${appId}/public/data/saida`), {
                            ...baseData, data: d.toISOString().split('T')[0], parcela: `${i}/${total}`, recorrente: false
                        });
                    }
                } else {
                    await addDoc(collection(db, `artifacts/${appId}/public/data/saida`), { ...baseData, parcela: '', recorrente: rec });
                }
            } else {
                await addDoc(collection(db, `artifacts/${appId}/public/data/entrada`), baseData);
            }
            e.target.reset();
            document.getElementById('data').value = new Date().toISOString().split('T')[0];
        };

        document.getElementById('btnImportarRecorrentes').onclick = async () => {
            const mesAtual = parseInt(document.getElementById('mes').value);
            const anoAtual = parseInt(document.getElementById('ano').value);
            const mesAnt = mesAtual === 1 ? 12 : mesAtual - 1;
            const anoAnt = mesAtual === 1 ? anoAtual - 1 : anoAtual;

            const recsAnt = saidas.filter(s => {
                const [y, m] = s.data.split('-').map(Number);
                return s.recorrente && y === anoAnt && m === mesAnt;
            });

            if (recsAnt.length === 0) return alert("Nenhuma conta fixa encontrada no mês anterior.");
            
            if (confirm(`Importar ${recsAnt.length} contas fixas para ${mesAtual}/${anoAtual}?`)) {
                for (const r of recsAnt) {
                    const diaOriginal = r.data.split('-')[2];
                    const novaData = `${anoAtual}-${String(mesAtual).padStart(2, '0')}-${diaOriginal}`;
                    if (!saidas.some(s => s.descricao === r.descricao && s.data === novaData)) {
                        const { id, ...data } = r;
                        await addDoc(collection(db, `artifacts/${appId}/public/data/saida`), { ...data, data: novaData, timestamp: serverTimestamp() });
                    }
                }
                alert("Importação concluída!");
            }
        };

        // Form UX
        document.getElementById('btnEntrada').onclick = () => {
            document.getElementById('tipoTransacao').value = 'entrada';
            document.getElementById('btnEntrada').className = 'flex-1 py-2 rounded-lg font-bold bg-green-500 text-white shadow-sm border-2 border-green-500';
            document.getElementById('btnSaida').className = 'flex-1 py-2 rounded-lg font-bold bg-gray-200 text-gray-700 shadow-sm border-2 border-transparent';
            document.getElementById('parcelaField').classList.add('hidden');
            document.getElementById('recorrenteField').classList.add('hidden');
        };
        document.getElementById('btnSaida').onclick = () => {
            document.getElementById('tipoTransacao').value = 'saida';
            document.getElementById('btnSaida').className = 'flex-1 py-2 rounded-lg font-bold bg-red-500 text-white shadow-sm border-2 border-red-500';
            document.getElementById('btnEntrada').className = 'flex-1 py-2 rounded-lg font-bold bg-gray-200 text-gray-700 shadow-sm border-2 border-transparent';
            document.getElementById('parcelaField').classList.remove('hidden');
            document.getElementById('recorrenteField').classList.remove('hidden');
        };

        const triggerRender = () => render();
        ['mes', 'ano', 'filterEntrada', 'filterSaida'].forEach(id => document.getElementById(id).onchange = triggerRender);

        // App start
        window.onload = () => {
            initSelects();
            const hoje = new Date();
            document.getElementById('mes').value = hoje.getMonth() + 1;
            document.getElementById('ano').value = hoje.getFullYear();
            document.getElementById('data').value = hoje.toISOString().split('T')[0];
            document.getElementById('invNewYear').value = hoje.getFullYear();

            onAuthStateChanged(auth, user => {
                if (user) {
                    currentUserId = user.uid;
                    document.getElementById('authMessage').textContent = `Conectado: ${user.displayName}`;
                    document.getElementById('authMessage').classList.remove('hidden');
                    document.getElementById('googleSignInBtn').classList.add('hidden');
                    document.getElementById('logoutBtn').classList.remove('hidden');
                    document.getElementById('topTabRotina').classList.remove('hidden');
                    document.getElementById('topTabInvestimentos').classList.remove('hidden');

                    onSnapshot(collection(db, `artifacts/${appId}/public/data/entrada`), s => {
                        entradas = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        render();
                    });
                    onSnapshot(collection(db, `artifacts/${appId}/public/data/saida`), s => {
                        saidas = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        render();
                    });
                    subscribeRotina();
                    subscribeInvestimentos();
                } else {
                    currentUserId = null;
                    document.getElementById('authMessage').classList.add('hidden');
                    document.getElementById('googleSignInBtn').classList.remove('hidden');
                    document.getElementById('logoutBtn').classList.add('hidden');
                    document.getElementById('topTabRotina').classList.add('hidden');
                    document.getElementById('topTabInvestimentos').classList.add('hidden');
                    document.getElementById('topTabFinanceiro').click();
                    entradas = []; saidas = []; render();
                    unsubscribeRotina();
                    unsubscribeInvestimentos();
                }
            });
        };

        // === TOP-LEVEL TAB SWITCHING ===
        const topTabs = [
            { btn: 'topTabFinanceiro', content: 'financeiroContent' },
            { btn: 'topTabRotina', content: 'rotinaContent' },
            { btn: 'topTabInvestimentos', content: 'investimentosContent' }
        ];
        topTabs.forEach(t => {
            document.getElementById(t.btn).onclick = () => {
                topTabs.forEach(x => {
                    document.getElementById(x.btn).classList.remove('top-nav-active');
                    document.getElementById(x.btn).className = 'flex-1 py-4 text-lg font-bold text-gray-500 hover:bg-gray-50 transition';
                    document.getElementById(x.content).classList.remove('active');
                });
                document.getElementById(t.btn).className = 'flex-1 py-4 text-lg font-bold transition top-nav-active';
                document.getElementById(t.content).classList.add('active');
            };
        });

        // === ROTINA: RENDER ===
        function renderRotina() {
            DAYS_ORDER.forEach(day => {
                const container = document.querySelector(`.routine-cards[data-day="${day}"]`);
                if (!container) return;

                const dayTasks = routineTasks.filter(t => t.day === day);
                const statusMap = {};
                routineWeekStatus.forEach(s => { if (s.day === day) statusMap[s.taskId] = s.done; });

                container.innerHTML = dayTasks.map(task => {
                    const isDone = statusMap[task.id] || false;
                    const count = routineCountsMap[task.title] || 0;
                    const goal = routineGoalsMap[task.title];
                    const countLabel = goal ? `${count}/${goal}` : `${count}x`;

                    return `
                        <div class="routine-card ${isDone ? 'routine-card-done' : ''}"
                             data-task-id="${task.id}"
                             data-from-day="${day}">
                            ${isDone
                                ? '<div class="routine-checkmark">&#10003;</div>'
                                : `<button class="routine-delete-btn" data-delete-id="${task.id}" data-delete-day="${day}">&times;</button>`
                            }
                            <p class="text-sm font-semibold text-gray-800 mb-1 pr-6">${task.title}</p>
                            <span class="routine-count" data-count-title="${task.title}">${countLabel}</span>
                            <span class="routine-drag-handle" draggable="true" title="Arrastar">⋮⋮</span>
                        </div>
                    `;
                }).join('');
            });
            bindRoutineCardEvents();
        }

        // === ROTINA: CARD EVENT BINDINGS ===
        function bindRoutineCardEvents() {
            // Click to toggle done
            document.querySelectorAll('.routine-card').forEach(card => {
                card.onclick = (e) => {
                    if (e.target.closest('.routine-delete-btn') || e.target.closest('.routine-count') || e.target.closest('.routine-goal-input') || e.target.closest('.routine-drag-handle')) return;
                    const taskId = card.dataset.taskId;
                    const day = card.dataset.fromDay;
                    window.toggleRoutineDone(taskId, day);
                };
            });

            // Delete buttons
            document.querySelectorAll('.routine-delete-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    window.deleteRoutineTask(btn.dataset.deleteId, btn.dataset.deleteDay);
                };
            });

            // Count click -> edit goal
            document.querySelectorAll('.routine-count').forEach(span => {
                span.onclick = (e) => {
                    e.stopPropagation();
                    const title = span.dataset.countTitle;
                    const currentGoal = routineGoalsMap[title];
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.className = 'routine-goal-input';
                    input.value = currentGoal || '';
                    input.placeholder = 'Meta';
                    span.replaceWith(input);
                    input.focus();

                    const save = async () => {
                        const val = input.value.trim();
                        const goalVal = val ? parseInt(val) : null;
                        try {
                            if (goalVal && goalVal > 0) {
                                await setDoc(doc(db, userPath('rotina_goals'), title), { title, goal: goalVal });
                            } else {
                                await deleteDoc(doc(db, userPath('rotina_goals'), title));
                            }
                        } catch(err) { console.error('Goal update error:', err); }
                    };
                    input.onkeydown = (ev) => {
                        if (ev.key === 'Enter') { ev.preventDefault(); save(); }
                        if (ev.key === 'Escape') renderRotina();
                    };
                    input.onblur = () => save();
                };
            });

            // Drag and drop (only from handle)
            document.querySelectorAll('.routine-drag-handle').forEach(handle => {
                const card = handle.closest('.routine-card');
                handle.ondragstart = (e) => {
                    e.dataTransfer.setData('taskId', card.dataset.taskId);
                    e.dataTransfer.setData('fromDay', card.dataset.fromDay);
                    card.classList.add('routine-card-dragging');
                };
                handle.ondragend = () => card.classList.remove('routine-card-dragging');
            });

            document.querySelectorAll('.routine-column').forEach(col => {
                col.ondragover = (e) => { e.preventDefault(); col.classList.add('routine-column-drag-over'); };
                col.ondragleave = () => col.classList.remove('routine-column-drag-over');
                col.ondrop = async (e) => {
                    e.preventDefault();
                    col.classList.remove('routine-column-drag-over');
                    const taskId = e.dataTransfer.getData('taskId');
                    const fromDay = e.dataTransfer.getData('fromDay');
                    const toDay = col.dataset.day;
                    if (fromDay === toDay || !taskId) return;
                    try {
                        await updateDoc(doc(db, userPath('rotina_tasks'), taskId), { day: toDay });
                        const statusSnap = await getDocs(query(
                            collection(db, userPath('rotina_week_status')),
                            where('taskId', '==', taskId)
                        ));
                        for (const s of statusSnap.docs) { await deleteDoc(s.ref); }
                    } catch(err) { console.error('Move error:', err); }
                };
            });
        }

        // === ROTINA: ACTIONS ===
        window.toggleRoutineDone = async (taskId, day) => {
            try {
                const statusId = `${day}_${taskId}`;
                const statusRef = doc(db, userPath('rotina_week_status'), statusId);
                const existing = routineWeekStatus.find(s => s.taskId === taskId && s.day === day);
                const wasDone = existing ? existing.done : false;

                if (wasDone) {
                    await deleteDoc(statusRef);
                } else {
                    await setDoc(statusRef, { taskId, day, done: true });
                    const task = routineTasks.find(t => t.id === taskId);
                    if (task) {
                        const countRef = doc(db, userPath('rotina_counts'), task.title);
                        const countSnap = await getDoc(countRef);
                        const current = countSnap.exists() ? countSnap.data().count : 0;
                        await setDoc(countRef, { title: task.title, count: current + 1 });
                    }
                }
            } catch(err) { console.error('Toggle done error:', err); }
        };

        window.deleteRoutineTask = async (taskId, day) => {
            if (!confirm('Apagar esta tarefa?')) return;
            try {
                await deleteDoc(doc(db, userPath('rotina_tasks'), taskId));
                const statusSnap = await getDocs(query(
                    collection(db, userPath('rotina_week_status')),
                    where('taskId', '==', taskId)
                ));
                for (const s of statusSnap.docs) { await deleteDoc(s.ref); }
            } catch(err) { console.error('Delete error:', err); }
        };

        // Add task forms
        document.querySelectorAll('.routine-add-form').forEach(form => {
            form.onsubmit = async (e) => {
                e.preventDefault();
                const day = form.dataset.day;
                const input = form.querySelector('input[type="text"]');
                const title = input.value.trim();
                if (!title) return;
                try {
                    await addDoc(collection(db, userPath('rotina_tasks')), {
                        title, day, timestamp: serverTimestamp()
                    });
                    input.value = '';
                } catch(err) { console.error('Add task error:', err); }
            };
        });

        // Reset week
        document.getElementById('btnResetWeek').onclick = async () => {
            if (!confirm('Resetar todos os "feitos" da semana? O contador nao sera resetado.')) return;
            try {
                const snap = await getDocs(collection(db, userPath('rotina_week_status')));
                for (const s of snap.docs) { await deleteDoc(s.ref); }
            } catch(err) { console.error('Reset error:', err); }
        };

        // === ROTINA: SUBSCRIBE TO FIRESTORE ===
        function subscribeRotina() {
            rotinaUnsubscribers.forEach(unsub => unsub());
            rotinaUnsubscribers = [];

            rotinaUnsubscribers.push(onSnapshot(collection(db, userPath('rotina_tasks')), s => {
                routineTasks = s.docs.map(d => ({ id: d.id, ...d.data() }));
                renderRotina();
            }));
            rotinaUnsubscribers.push(onSnapshot(collection(db, userPath('rotina_week_status')), s => {
                routineWeekStatus = s.docs.map(d => ({ id: d.id, ...d.data() }));
                renderRotina();
            }));
            rotinaUnsubscribers.push(onSnapshot(collection(db, userPath('rotina_counts')), s => {
                routineCountsMap = {};
                s.docs.forEach(d => { const data = d.data(); routineCountsMap[data.title || d.id] = data.count || 0; });
                renderRotina();
            }));
            rotinaUnsubscribers.push(onSnapshot(collection(db, userPath('rotina_goals')), s => {
                routineGoalsMap = {};
                s.docs.forEach(d => { const data = d.data(); routineGoalsMap[data.title || d.id] = data.goal; });
                renderRotina();
            }));
        }

        function unsubscribeRotina() {
            rotinaUnsubscribers.forEach(unsub => unsub());
            rotinaUnsubscribers = [];
            routineTasks = []; routineWeekStatus = [];
            routineCountsMap = {}; routineGoalsMap = {};
            renderRotina();
        }

        // === INVESTIMENTOS: SUBSCRIBE ===
        function subscribeInvestimentos() {
            invUnsubscribers.forEach(u => u());
            invUnsubscribers = [];

            invUnsubscribers.push(onSnapshot(collection(db, userPath('investimentos')), s => {
                investimentos = s.docs.map(d => ({ id: d.id, ...d.data() }));
                renderInvestimentos();
            }));
            invUnsubscribers.push(onSnapshot(collection(db, userPath('inv_years')), s => {
                invTrackedYears = s.docs.map(d => parseInt(d.id)).filter(y => !isNaN(y));
                renderInvestimentos();
            }));
        }
        function unsubscribeInvestimentos() {
            invUnsubscribers.forEach(u => u());
            invUnsubscribers = [];
            investimentos = [];
            invTrackedYears = [];
            renderInvestimentos();
        }

        // === INVESTIMENTOS: RENDER ===
        const MONTH_NAMES = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

        function getInvTotal(dataMap, docId) {
            const inv = dataMap[docId] || {};
            return (inv.tesouro || 0) + (inv.acoes || 0) + (inv.fundoImob || 0);
        }

        function renderInvestimentos() {
            const years = [...invTrackedYears].sort((a, b) => b - a);

            const dataMap = {};
            investimentos.forEach(inv => { dataMap[inv.id] = inv; });

            const tableHeader = `
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-4 py-3 text-left font-bold text-gray-700">Meses</th>
                        <th class="px-4 py-3 text-right font-bold text-gray-700">Tesouro</th>
                        <th class="px-4 py-3 text-right font-bold text-gray-500">Tes %</th>
                        <th class="px-4 py-3 text-right font-bold text-gray-500">Tes Var%</th>
                        <th class="px-4 py-3 text-right font-bold text-gray-700">Acoes</th>
                        <th class="px-4 py-3 text-right font-bold text-gray-500">Ac %</th>
                        <th class="px-4 py-3 text-right font-bold text-gray-500">Ac Var%</th>
                        <th class="px-4 py-3 text-right font-bold text-gray-700">Fundo Imob.</th>
                        <th class="px-4 py-3 text-right font-bold text-gray-500">Fun %</th>
                        <th class="px-4 py-3 text-right font-bold text-gray-500">Fun Var%</th>
                        <th class="px-4 py-3 text-right font-bold text-indigo-700">Total</th>
                        <th class="px-4 py-3 text-right font-bold text-gray-500">Ultimo Mes</th>
                        <th class="px-4 py-3 text-right font-bold text-gray-500">Variacao %</th>
                    </tr>
                </thead>`;

            if (years.length === 0) {
                document.getElementById('invTablesContainer').innerHTML = '<p class="text-gray-400 text-center py-8">Nenhum ano adicionado. Use o botao acima para adicionar.</p>';
                return;
            }

            let allHtml = '';

            const varCls = (v) => v > 0 ? 'inv-positive' : (v < 0 ? 'inv-negative' : 'inv-zero');
            const varPct = (cur, prev) => prev > 0 ? (((cur - prev) / prev) * 100).toFixed(1) : '0.0';

            years.forEach(year => {
                let rowsHtml = '';
                const prevDecId = `${year - 1}-12`;
                const prevDec = dataMap[prevDecId] || {};
                let prevTotal = getInvTotal(dataMap, prevDecId);
                let prevTesouro = prevDec.tesouro || 0;
                let prevAcoes = prevDec.acoes || 0;
                let prevFundo = prevDec.fundoImob || 0;
                const prevDecHasData = prevTotal > 0;

                for (let m = 1; m <= 12; m++) {
                    const docId = `${year}-${String(m).padStart(2, '0')}`;
                    const inv = dataMap[docId] || {};
                    const tesouro = inv.tesouro || 0;
                    const acoes = inv.acoes || 0;
                    const fundoImob = inv.fundoImob || 0;
                    const total = tesouro + acoes + fundoImob;

                    const tesouroP = total > 0 ? ((tesouro / total) * 100).toFixed(2) : '0.00';
                    const acoesP = total > 0 ? ((acoes / total) * 100).toFixed(2) : '0.00';
                    const fundoP = total > 0 ? ((fundoImob / total) * 100).toFixed(2) : '0.00';

                    const hasPrev = m === 1 ? prevDecHasData : true;
                    const ultimoMes = prevTotal;
                    const variacao = varPct(total, ultimoMes);
                    const tesVar = varPct(tesouro, prevTesouro);
                    const acVar = varPct(acoes, prevAcoes);
                    const funVar = varPct(fundoImob, prevFundo);

                    rowsHtml += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-4 py-3 font-semibold text-gray-800">${MONTH_NAMES[m - 1]}</td>
                            <td class="px-4 py-3 text-right">
                                <span class="inv-editable" data-doc-id="${docId}" data-field="tesouro" data-ano="${year}" data-mes="${m}">${formatMoeda(tesouro)}</span>
                            </td>
                            <td class="px-4 py-3 text-right text-gray-400 text-xs">${tesouroP}%</td>
                            <td class="px-4 py-3 text-right text-xs ${hasPrev ? varCls(parseFloat(tesVar)) : 'inv-zero'}">${hasPrev ? tesVar + '%' : '-'}</td>
                            <td class="px-4 py-3 text-right">
                                <span class="inv-editable" data-doc-id="${docId}" data-field="acoes" data-ano="${year}" data-mes="${m}">${formatMoeda(acoes)}</span>
                            </td>
                            <td class="px-4 py-3 text-right text-gray-400 text-xs">${acoesP}%</td>
                            <td class="px-4 py-3 text-right text-xs ${hasPrev ? varCls(parseFloat(acVar)) : 'inv-zero'}">${hasPrev ? acVar + '%' : '-'}</td>
                            <td class="px-4 py-3 text-right">
                                <span class="inv-editable" data-doc-id="${docId}" data-field="fundoImob" data-ano="${year}" data-mes="${m}">${formatMoeda(fundoImob)}</span>
                            </td>
                            <td class="px-4 py-3 text-right text-gray-400 text-xs">${fundoP}%</td>
                            <td class="px-4 py-3 text-right text-xs ${hasPrev ? varCls(parseFloat(funVar)) : 'inv-zero'}">${hasPrev ? funVar + '%' : '-'}</td>
                            <td class="px-4 py-3 text-right font-bold text-indigo-700">${formatMoeda(total)}</td>
                            <td class="px-4 py-3 text-right text-gray-400">${hasPrev ? formatMoeda(ultimoMes) : '-'}</td>
                            <td class="px-4 py-3 text-right ${hasPrev ? varCls(parseFloat(variacao)) : 'inv-zero'}">${hasPrev ? variacao + '%' : '-'}</td>
                        </tr>
                    `;
                    prevTotal = total;
                    prevTesouro = tesouro;
                    prevAcoes = acoes;
                    prevFundo = fundoImob;
                }

                allHtml += `
                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-xl font-bold text-gray-700">${year}</h3>
                            <button class="inv-remove-year text-xs text-red-500 hover:text-red-700 font-bold transition" data-year="${year}">Remover</button>
                        </div>
                        <div class="bg-white rounded-xl shadow-lg border overflow-x-auto">
                            <table class="min-w-full text-sm">
                                ${tableHeader}
                                <tbody class="divide-y divide-gray-200">${rowsHtml}</tbody>
                            </table>
                        </div>
                    </div>
                `;
            });

            document.getElementById('invTablesContainer').innerHTML = allHtml;
            bindInvEditableEvents();
            bindInvRemoveYearEvents();
        }

        // === INVESTIMENTOS: ADD / REMOVE YEAR ===
        document.getElementById('addYearForm').onsubmit = async (e) => {
            e.preventDefault();
            const year = parseInt(document.getElementById('invNewYear').value);
            if (!year || year < 2020 || year > 2100) return;
            if (invTrackedYears.includes(year)) return;
            try {
                await setDoc(doc(db, userPath('inv_years'), String(year)), { year });
            } catch(err) { console.error('Add year error:', err); }
        };

        function bindInvRemoveYearEvents() {
            document.querySelectorAll('.inv-remove-year').forEach(btn => {
                btn.onclick = async () => {
                    const year = btn.dataset.year;
                    if (!confirm(`Remover a tabela de ${year}? Os dados dos meses nao serao apagados.`)) return;
                    try {
                        await deleteDoc(doc(db, userPath('inv_years'), year));
                    } catch(err) { console.error('Remove year error:', err); }
                };
            });
        }

        // === INVESTIMENTOS: INLINE EDITING ===
        function bindInvEditableEvents() {
            document.querySelectorAll('.inv-editable').forEach(span => {
                span.onclick = () => {
                    const docId = span.dataset.docId;
                    const field = span.dataset.field;
                    const ano = parseInt(span.dataset.ano);
                    const mes = parseInt(span.dataset.mes);

                    const currentData = investimentos.find(i => i.id === docId);
                    const currentVal = currentData ? (currentData[field] || 0) : 0;

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.inputMode = 'decimal';
                    input.className = 'inv-input';
                    input.value = currentVal || '';
                    input.placeholder = '0.00';
                    span.replaceWith(input);
                    input.focus();
                    input.select();

                    const save = async () => {
                        const val = parseFloat(input.value.replace(/,/g, '')) || 0;
                        try {
                            const docRef = doc(db, userPath('investimentos'), docId);
                            const existing = await getDoc(docRef);
                            if (existing.exists()) {
                                await updateDoc(docRef, { [field]: val });
                            } else {
                                await setDoc(docRef, { tesouro: 0, acoes: 0, fundoImob: 0, ano, mes, [field]: val });
                            }
                        } catch(err) { console.error('Investment save error:', err); }
                    };

                    input.onkeydown = (ev) => {
                        if (ev.key === 'Enter') { ev.preventDefault(); save(); }
                        if (ev.key === 'Escape') renderInvestimentos();
                    };
                    input.onblur = () => save();
                };
            });
        }

        document.getElementById('googleSignInBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
